{% extends "base.html" %}

{% block content %}

    <h1>Lands of Legends Generator</h1>
    <p>Generate NPCs, monsters, settlements, encounters, cyphers, artifacts, and inns.</p>

    <div class="grid">
      <form id="generator-form" class="panel">
        <div class="field">
          <label for="type">Content type</label>
          <select id="type" name="type">
            <option value="npc">npc</option>
            <option value="monster">monster</option>
            <option value="settlement">settlement</option>
            <option value="encounter">encounter</option>
            <option value="cypher">cypher</option>
            <option value="artifact">artifact</option>
            <option value="inn">inn</option>
          </select>
        </div>

        <div id="character-fields">
          <div class="row">
            <div class="field">
              <label for="gender">Gender</label>
              <select id="gender" name="gender"></select>
            </div>
            <div class="field">
              <label for="profession">Profession</label>
              <select id="profession" name="profession"></select>
            </div>
          </div>
          <div id="monster-fields" class="hidden">
            <div class="row">
              <div class="field">
                <label for="monster-family">Monster family</label>
                <select id="monster-family" name="monster-family">
                  <option value="">Random</option>
                </select>
              </div>
              <div class="field">
                <label for="monster-role">Monster role</label>
                <select id="monster-role" name="monster-role">
                  <option value="">Random</option>
                </select>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="field">
              <label for="race">Race</label>
              <select id="race" name="race"></select>
            </div>
            <div class="field">
              <label for="variant">Variant</label>
              <select id="variant" name="variant">
                <option value="">None</option>
              </select>
            </div>
          </div>
        </div>

        <div class="field">
          <label for="environment">Area</label>
          <select id="environment" name="environment"></select>
        </div>

        <div class="row">
          <div class="field">
            <label for="mood">Mood</label>
            <input id="mood" name="mood" placeholder="Optional" />
          </div>
          <div class="field">
            <label for="seed">Seed</label>
            <input id="seed" name="seed" placeholder="Optional" />
          </div>
        </div>

        <div class="actions">
          <button type="submit">Generate</button>
          <button type="button" class="secondary" id="copy-btn">Copy result</button>
          <span class="status" id="status">Loading metadata...</span>
        </div>
      </form>

      <div class="panel">
        <div id="output" class="output-panel"></div>
      </div>
    </div>

    <div class="panel" style="margin-top: 12px;">
      <h3>Raw Text Parser</h3>
      <p class="small">Paste compendium-style text, select type, and save a parsed local entry.</p>
      <form id="raw-parse-form">
        <div class="row">
          <div class="field">
            <label for="raw-type">Parsed type</label>
            <select id="raw-type" name="raw-type">
              <option value="auto">auto</option>
              <option value="cypher">cypher</option>
              <option value="artifact">artifact</option>
              <option value="npc">npc</option>
              <option value="creature">creature</option>
              <option value="monster">monster</option>
              <option value="settlement">settlement</option>
              <option value="encounter">encounter</option>
              <option value="inn">inn</option>
              <option value="location">location</option>
              <option value="lore">lore</option>
            </select>
          </div>
          <div class="field">
            <label for="raw-setting">Genre/Setting tag (optional)</label>
            <input id="raw-setting" name="raw-setting" placeholder="e.g. fantasy or lands_of_legends" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="raw-area">Area (optional)</label>
            <input id="raw-area" name="raw-area" placeholder="e.g. fenmir_highlands" />
          </div>
          <div class="field">
            <label for="raw-location">Location (optional)</label>
            <input id="raw-location" name="raw-location" placeholder="e.g. Broken Hearth Tavern" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="raw-sourcebook">Sourcebook (optional)</label>
            <input id="raw-sourcebook" name="raw-sourcebook" placeholder="e.g. Godforsaken" />
          </div>
          <div class="field">
            <label for="raw-pages">Page(s) (optional)</label>
            <input id="raw-pages" name="raw-pages" placeholder="e.g. 142 or 142-143" />
          </div>
        </div>
        <div class="field">
          <label for="raw-text">Raw text</label>
          <textarea id="raw-text" name="raw-text" rows="12" placeholder="Paste raw text here..."></textarea>
        </div>
        <div class="actions">
          <button type="submit">Parse Preview</button>
          <span class="status" id="raw-status">Ready.</span>
        </div>
      </form>
      <div id="raw-preview" class="results" style="margin-top:10px;"></div>
    </div>

  <script>
    const state = {
      meta: null,
      races: {},
      allEnvironments: [],
      monsterEnvironments: [],
      artifactDepletionTable: [],
      rawPreview: {
        payload: null,
        items: [],
      },
    };

    const els = {
      type: document.getElementById('type'),
      gender: document.getElementById('gender'),
      profession: document.getElementById('profession'),
      race: document.getElementById('race'),
      variant: document.getElementById('variant'),
      environment: document.getElementById('environment'),
      mood: document.getElementById('mood'),
      seed: document.getElementById('seed'),
      output: document.getElementById('output'),
      status: document.getElementById('status'),
      form: document.getElementById('generator-form'),
      copyBtn: document.getElementById('copy-btn'),
      characterFields: document.getElementById('character-fields'),
      monsterFields: document.getElementById('monster-fields'),
      monsterFamily: document.getElementById('monster-family'),
      monsterRole: document.getElementById('monster-role'),
      rawForm: document.getElementById('raw-parse-form'),
      rawType: document.getElementById('raw-type'),
      rawSetting: document.getElementById('raw-setting'),
      rawArea: document.getElementById('raw-area'),
      rawLocation: document.getElementById('raw-location'),
      rawSourcebook: document.getElementById('raw-sourcebook'),
      rawPages: document.getElementById('raw-pages'),
      rawText: document.getElementById('raw-text'),
      rawStatus: document.getElementById('raw-status'),
      rawPreview: document.getElementById('raw-preview'),
    };

    function fillSelect(select, values, includeBlank = false) {
      select.innerHTML = '';
      if (includeBlank) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = 'None';
        select.appendChild(opt);
      }
      values.forEach(value => {
        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = value;
        select.appendChild(opt);
      });
    }

    async function fetchJson(url) {
      const res = await fetch(url);
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.error || `Request failed: ${res.status}`);
      }
      return data;
    }

    function updateEnvironmentOptions() {
      const type = els.type.value;
      const current = els.environment.value;

      let values = state.allEnvironments;
      if (type === 'monster') {
        values = state.monsterEnvironments.length
          ? state.monsterEnvironments
          : state.allEnvironments;
      }

      fillSelect(els.environment, values);

      if (values.includes(current)) {
        els.environment.value = current;
      }
    }

    async function loadBootData() {
      const [meta, races] = await Promise.all([
        fetchJson('/meta'),
        fetchJson('/meta/races')
      ]);

      state.meta = meta;
      state.races = races.races || {};

      fillSelect(
        els.gender,
        (meta.genders && meta.genders.length
          ? meta.genders
          : ['male', 'female', 'nonbinary'])
      );
      fillSelect(els.profession, meta.professions || []);
      fillSelect(els.race, meta.races || []);
      state.allEnvironments = meta.areas || meta.environments || [];
      state.monsterEnvironments = meta.monster_areas || meta.monster_environments || [];
      state.artifactDepletionTable = Array.isArray(meta.artifact_depletion_table)
        ? meta.artifact_depletion_table
        : [];
      fillSelect(els.environment, state.allEnvironments);
      fillSelect(els.monsterFamily, meta.monster_families || [], true);
      fillSelect(els.monsterRole, meta.monster_roles || [], true);
      updateVariantOptions();
      updateVisibleFields();
      els.status.textContent = 'Ready.';
    }

    function updateVariantOptions() {
      const race = els.race.value;
      const raceData = state.races[race] || {};
      const variants = Object.keys(raceData.variants || {});
      fillSelect(els.variant, variants, true);
    }

    function updateVisibleFields() {
      const type = els.type.value;
      const isCharacterLike = type === 'npc';
      const isMonster = type === 'monster';

      els.characterFields.classList.toggle('hidden', !isCharacterLike);
      els.monsterFields.classList.toggle('hidden', !isMonster);

      updateEnvironmentOptions();
      if (type === 'artifact' && state.artifactDepletionTable.length) {
        els.status.textContent = `Artifact depletion table: ${state.artifactDepletionTable.join(', ')}`;
      } else if (els.status.textContent.startsWith('Artifact depletion table:')) {
        els.status.textContent = 'Ready.';
      }
    }

    function buildPayload() {
      const type = els.type.value;
      const payload = {
        area: els.environment.value,
        mood: els.mood.value.trim(),
        seed: els.seed.value.trim()
      };

      if (type === 'npc') {
        payload.gender = els.gender.value;
        payload.profession = els.profession.value;
        payload.race = els.race.value;
        payload.variant = els.variant.value;
      }

      if (type === 'monster') {
        payload.family = els.monsterFamily.value;
        payload.role = els.monsterRole.value;
      }

      Object.keys(payload).forEach(key => {
        if (!payload[key]) delete payload[key];
      });

      return payload;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function titleCase(key) {
      return key
        .replace(/_/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function renderSectionsCard(title, sections) {
      const rows = Object.entries(sections || {})
        .filter(([key, value]) => key !== "style" && value)
        .map(([key, value]) => `
          <div class="output-row">
            <div class="output-label">${escapeHtml(titleCase(key))}</div>
            <div class="output-value">${escapeHtml(value)}</div>
          </div>
        `)
        .join("");

      return `
        <div class="output-card">
          <h3>${escapeHtml(title)}</h3>
          ${rows}
        </div>
      `;
    }

    function renderStatBlockCard(statBlock) {
      const top = `
        <div class="stat-grid">
          <div class="stat-chip"><div class="k">Level</div><div class="v">${escapeHtml(statBlock.level ?? "")}</div></div>
          <div class="stat-chip"><div class="k">Target Number</div><div class="v">${escapeHtml(statBlock.target_number ?? "")}</div></div>
          <div class="stat-chip"><div class="k">Health</div><div class="v">${escapeHtml(statBlock.health ?? "")}</div></div>
          <div class="stat-chip"><div class="k">Armor</div><div class="v">${escapeHtml(statBlock.armor ?? "")}</div></div>
          <div class="stat-chip"><div class="k">Damage</div><div class="v">${escapeHtml(statBlock.damage ?? "")}</div></div>
          <div class="stat-chip"><div class="k">Movement</div><div class="v">${escapeHtml(statBlock.movement ?? "")}</div></div>
        </div>
      `;
    
      const renderList = (label, items) => {
        if (!items || !items.length) return "";
        return `
          <div class="output-row" style="margin-top:12px;">
            <div class="output-label">${escapeHtml(label)}</div>
            <ul class="output-list">
              ${items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}
            </ul>
          </div>
        `;
      };

      return `
        <div class="output-card">
          <h3>Cypher NPC Stat Block</h3>
          ${top}
          ${renderList("Modifications", statBlock.modifications)}
          ${renderList("Combat", statBlock.combat)}
          ${renderList("Interaction", statBlock.interaction)}
          ${renderList("Loot", statBlock.loot)}
        </div>
      `;
    }

    function renderCypherCard(result) {
      const sections = result.sections || {};
      const isArtifact = result.type === "artifact";
      const cardTitle = isArtifact ? "Artifact Card" : "Cypher Card";
      const defaultName = isArtifact ? "Unnamed Artifact" : "Unnamed Cypher";
      const limitLabel = isArtifact ? "Depletion" : "Limitation";
      const limitValue = sections.depletion || sections.limitation;

      return `
        <div class="output-card">
          <h3>${cardTitle}</h3>
          <div class="output-row">
            <div class="output-label">Name</div>
            <div class="output-value">${escapeHtml(result.name || sections.name || defaultName)}</div>
          </div>
          ${sections.level ? `
          <div class="output-row">
            <div class="output-label">Level</div>
            <div class="output-value">${escapeHtml(sections.level)}</div>
          </div>` : ""}
          ${sections.manifestation ? `
          <div class="output-row">
            <div class="output-label">Manifestation</div>
            <div class="output-value">${escapeHtml(sections.manifestation)}</div>
          </div>` : ""}
          ${sections.appearance ? `
          <div class="output-row">
            <div class="output-label">Appearance</div>
            <div class="output-value">${escapeHtml(sections.appearance)}</div>
          </div>` : ""}
          ${sections.effect ? `
          <div class="output-row">
            <div class="output-label">Effect</div>
            <div class="output-value">${escapeHtml(sections.effect)}</div>
          </div>` : ""}
          ${limitValue ? `
          <div class="output-row">
            <div class="output-label">${limitLabel}</div>
            <div class="output-value">${escapeHtml(limitValue)}</div>
          </div>` : ""}
          ${sections.quirk ? `
          <div class="output-row">
            <div class="output-label">Quirk</div>
            <div class="output-value">${escapeHtml(sections.quirk)}</div>
          </div>` : ""}
        </div>
      `;
    }

    function renderResult(data) {
      let html = "";

      if (data.type === "cypher" || data.type === "artifact") {
        html += renderCypherCard(data);
      } else {
        if (data.name) {
          html += `
            <div class="output-card">
              <h3>Name</h3>
              <div class="output-value">${escapeHtml(data.name)}</div>
            </div>
          `;
        }

        if (data.sections) {
          html += renderSectionsCard("Generated Content", data.sections);
        }

        if (data.stat_block) {
          html += renderStatBlockCard(data.stat_block);
        }
      }

      if (!html && data.text) {
        html = `
          <div class="output-card">
            <h3>Generated Output</h3>
            <div class="output-value">${escapeHtml(data.text)}</div>
          </div>
        `;
      }

      if (!html) {
        html = `
          <div class="output-card">
            <h3>Raw Output</h3>
            <div class="output-value">${escapeHtml(JSON.stringify(data, null, 2))}</div>
          </div>
        `;
      }

      els.output.innerHTML = html;
    }

    async function submitForm(event) {
      event.preventDefault();
      const type = els.type.value;
      const payload = buildPayload();
      els.status.textContent = 'Generating...';
      els.output.innerHTML = '';

      try {
        const res = await fetch(`/generate/${type}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `Request failed: ${res.status}`);

        renderResult(data);
        els.status.textContent = data.name ? `Generated: ${data.name}` : 'Generated.';
      } catch (err) {
        els.output.innerHTML = '';
        els.status.textContent = `Error: ${err.message}`;
      }
    }

    async function copyOutput() {
      const text = els.output.innerText.trim();
      if (!text) return;
      await navigator.clipboard.writeText(text);
      els.status.textContent = 'Copied to clipboard.';
    }

    async function submitRawParse(event) {
      event.preventDefault();
      const rawText = (els.rawText.value || '').trim();
      if (!rawText) {
        els.rawStatus.textContent = 'Paste raw text first.';
        return;
      }
      const payload = {
        type: els.rawType.value,
        raw_text: rawText,
      };
      if (els.rawSetting.value.trim()) payload.setting = els.rawSetting.value.trim();
      if (els.rawArea.value.trim()) payload.area = els.rawArea.value.trim();
      if (els.rawLocation.value.trim()) payload.location = els.rawLocation.value.trim();
      if (els.rawSourcebook.value.trim()) payload.sourcebook = els.rawSourcebook.value.trim();
      if (els.rawPages.value.trim()) payload.pages = els.rawPages.value.trim();

      els.rawStatus.textContent = 'Parsing preview...';
      els.rawPreview.innerHTML = '';
      try {
        const res = await fetch('/generate/parse-raw/preview', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `Request failed: ${res.status}`);
        const items = Array.isArray(data.items) ? data.items : [];
        state.rawPreview = { payload, items };
        renderRawPreview();
        els.rawStatus.textContent = `Parsed ${items.length} item(s). Save individually below.`;
      } catch (err) {
        els.rawStatus.textContent = `Error: ${err.message}`;
      }
    }

    function renderRawPreview() {
      const items = (state.rawPreview && state.rawPreview.items) || [];
      if (!items.length) {
        els.rawPreview.innerHTML = `<div class="output-card"><div class="output-value">No parsable items found.</div></div>`;
        return;
      }
      els.rawPreview.innerHTML = items.map((item, idx) => {
        const sections = item.sections || {};
        const level = sections.level || item.level || "";
        const keyBits = [
          sections.manifestation ? `Manifestation: ${sections.manifestation}` : "",
          sections.appearance ? `Appearance: ${sections.appearance}` : "",
          sections.effect ? `Effect: ${sections.effect}` : "",
          sections.depletion ? `Depletion: ${sections.depletion}` : "",
          sections.limitation ? `Limitation: ${sections.limitation}` : "",
        ].filter(Boolean).join(" • ");
        return `
          <div class="output-card" data-raw-index="${idx}">
            <div class="output-row">
              <div class="output-label">Parsed #${idx + 1}</div>
              <div class="output-value">${escapeHtml(item.name || "Unnamed")} (${escapeHtml(item.type || "item")}${level ? `, Lvl ${escapeHtml(String(level))}` : ""})</div>
            </div>
            ${item.description ? `<div class="output-row"><div class="output-label">Description</div><div class="output-value">${escapeHtml(item.description)}</div></div>` : ""}
            ${keyBits ? `<div class="small" style="margin-top:8px;">${escapeHtml(keyBits)}</div>` : ""}
            <div class="actions" style="margin-top:10px;">
              <button type="button" class="secondary" data-action="inspect-parsed" data-index="${idx}">Inspect</button>
              <button type="button" data-action="save-parsed" data-index="${idx}">Save</button>
            </div>
          </div>
        `;
      }).join("");

      els.rawPreview.querySelectorAll('button[data-action="inspect-parsed"]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const idx = Number(btn.getAttribute('data-index') || '-1');
          const item = state.rawPreview.items[idx];
          if (item) {
            renderResult(item);
            els.status.textContent = `Inspecting parsed item #${idx + 1}.`;
          }
        });
      });

      els.rawPreview.querySelectorAll('button[data-action="save-parsed"]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const idx = Number(btn.getAttribute('data-index') || '-1');
          const item = state.rawPreview.items[idx];
          if (!item) return;
          btn.disabled = true;
          try {
            const res = await fetch('/generate/parse-raw/save', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                payload: state.rawPreview.payload || {},
                parsed: item,
              }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || `Request failed: ${res.status}`);
            const filename = data && data.storage ? data.storage.filename : '';
            btn.textContent = 'Saved';
            btn.classList.add('secondary');
            btn.disabled = true;
            renderResult(data);
            els.rawStatus.textContent = filename
              ? `Saved item #${idx + 1}: ${filename}`
              : `Saved item #${idx + 1}.`;
            els.status.textContent = data.name ? `Saved: ${data.name}` : 'Saved.';
          } catch (err) {
            btn.disabled = false;
            els.rawStatus.textContent = `Error saving item #${idx + 1}: ${err.message}`;
          }
        });
      });
    }

    els.type.addEventListener('change', updateVisibleFields);
    els.race.addEventListener('change', updateVariantOptions);
    els.form.addEventListener('submit', submitForm);
    els.copyBtn.addEventListener('click', copyOutput);
    els.rawForm.addEventListener('submit', submitRawParse);

    loadBootData().catch(err => {
      els.status.textContent = `Error loading metadata: ${err.message}`;
    });
  </script>
  {% endblock %}
