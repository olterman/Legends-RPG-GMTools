setting:
  name: Lands of Legends
  summary: >
    A mythic fantasy world shaped by ancient migrations, damaged Gates,
    and conflicting origin myths.

  tone_style: >
    Epic, mystical, grounded, ancient-but-lived-in, high fantasy with mythic ambiguity.
    Cultures feel old, layered, and internally consistent.

  core_world_truths:
    - >
      The Alfirin are immortal exiles who entered this world through Gates
      after a failed negotiation with the Velim, damaging reality.
    - >
      The Velim are ancient custodians of Gates and thresholds, forced into
      guardianship after the Alfirin passage went wrong.
    - >
      History is fragmented; myths contradict; no single culture is fully correct.

  cultural_themes:
    - ancient wounds still shaping the present
    - survival over destiny
    - balance versus permanence
    - quiet guardianship versus visible power
    - myth over absolute truth

  prompt_focus_types:
    - city
    - nation
    - faction
    - landmark
    - culture
    - myth
    - npc
    - artifact
    - settlement
    - encounter
    - cypher

  output_guidelines:
    - avoid modern language
    - avoid absolute good versus evil framing
    - use sensory detail and cultural texture
    - allow contradictions and unanswered questions
    - keep scale appropriate to the subject
    - emphasize cultures as internally coherent rather than monolithic

  generation_defaults:
    style_block: legends_style_art
    prompt_type: default_npc
    include_setting_header: true
    include_race_flavor: true
    include_environment_text: true
    include_style_block: true

  cypher_system:
    game: Cypher System
    setting: Godforsaken
    artifact_depletion_table:
      - depletion: 1 in 1d6
      - depletion: 1 in 1d10
      - depletion: 1 in 1d20
      - depletion: 1 in 1d100
    defaults:
      include_level: true
      include_manifestation: true
      include_quirk: true
      include_depletion: true
