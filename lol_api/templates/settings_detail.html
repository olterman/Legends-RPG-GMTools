{% extends "base.html" %}

{% block title %}Setting Details — Lands of Legend GM-Tools{% endblock %}

{% block content %}
<h1 id="setting-title">Setting Details</h1>
<p id="setting-subtitle">Loading setting details...</p>

<div class="layout">
  <div class="panel">
    <div class="output-card">
      <div id="setting-cover-wrap" class="setting-cover-wrap"></div>
      <div id="setting-meta" class="small" style="margin-top: 10px;"></div>
    </div>
  </div>
  <div class="panel">
    <div class="output-card">
      <div class="small">World Info</div>
      <div id="setting-world-info" style="margin-top:8px;"></div>
    </div>
    <div class="output-card" style="margin-top: 12px;">
      <div class="small">Stats</div>
      <div id="setting-stats" style="margin-top:8px;"></div>
    </div>
    <div class="output-card" style="margin-top: 12px;">
      <div class="small">Config Files</div>
      <div id="setting-files" class="small" style="margin-top:8px;"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(() => {
  const settingId = "{{ setting_id|e }}";
  const els = {
    title: document.getElementById("setting-title"),
    subtitle: document.getElementById("setting-subtitle"),
    coverWrap: document.getElementById("setting-cover-wrap"),
    meta: document.getElementById("setting-meta"),
    worldInfo: document.getElementById("setting-world-info"),
    stats: document.getElementById("setting-stats"),
    files: document.getElementById("setting-files"),
  };

  function escapeHtml(text) {
    return String(text ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  async function fetchJson(url) {
    const res = await fetch(url);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `Request failed: ${res.status}`);
    return data;
  }

  function row(label, value) {
    const v = String(value ?? "").trim();
    if (!v) return "";
    return `<div style="margin-bottom:6px;"><strong>${escapeHtml(label)}:</strong> ${escapeHtml(v)}</div>`;
  }

  async function load() {
    const data = await fetchJson(`/api/settings/${encodeURIComponent(settingId)}`);
    els.title.textContent = String(data.label || data.id || "Setting");
    els.subtitle.textContent = `Setting ID: ${String(data.id || settingId)}`;
    els.coverWrap.innerHTML = `<img src="${escapeHtml(String(data.cover_url || ""))}" alt="${escapeHtml(String(data.label || data.id || "Setting"))} cover" class="setting-cover" />`;
    els.meta.innerHTML = row("Core Genre", data.core_genre) + row("Summary", data.summary);
    els.worldInfo.innerHTML = row("Description", data.description) + row("Tone", data.tone_style);

    const stats = data.stats || {};
    els.stats.innerHTML = [
      row("Races", stats.races),
      row("Areas", stats.areas),
      row("Settlements", stats.settlements),
      row("Encounters", stats.encounters),
      row("Cyphers", stats.cyphers),
      row("Lore Areas", stats.lore_areas),
      row("Lore Settlements", stats.lore_settlements),
      row("Lore Encounters", stats.lore_encounters),
    ].join("");

    const files = Array.isArray(data.files) ? data.files : [];
    els.files.innerHTML = files.length
      ? files.map((f) => `<div><code>${escapeHtml(f)}</code></div>`).join("")
      : "No files found.";
  }

  load().catch((err) => {
    els.subtitle.textContent = `Failed to load setting details: ${err.message}`;
  });
})();
</script>
<style>
  .setting-cover-wrap {
    width: 100%;
    aspect-ratio: 16 / 9;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: rgba(0,0,0,0.18);
  }
  .setting-cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
</style>
{% endblock %}
